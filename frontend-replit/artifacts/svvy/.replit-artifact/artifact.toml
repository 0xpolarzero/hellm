kind = "web"
previewPath = "/"
title = "svvy"
version = "1.0.0"
id = "artifacts/svvy"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18506

[services.development]
run = "pnpm --filter @workspace/svvy run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/svvy", "run", "build" ]
publicDir = "artifacts/svvy/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18506"
BASE_PATH = "/"
